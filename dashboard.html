<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои PDF | Система рисования</title>
  <link rel="stylesheet" href="style.css?v=3">
  <style>
    .dashboard-page { min-height: 100vh; padding: 1.5rem; max-width: 900px; margin: 0 auto; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .dashboard-header h1 { font-size: 1.5rem; }
    .dashboard-actions { display: flex; gap: 0.75rem; align-items: center; }
    .dashboard-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
    @media (max-width: 600px) { .dashboard-cards { grid-template-columns: 1fr; } }
    .dashboard-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s;
      text-decoration: none; color: inherit; display: block;
    }
    .dashboard-card:hover { border-color: var(--accent); background: rgba(0,255,159,0.08); }
    .dashboard-card h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .dashboard-card p { font-size: 0.85rem; color: var(--text-secondary); }
    .pdf-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .pdf-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem 1.25rem; gap: 1rem; flex-wrap: wrap;
    }
    .pdf-item-info { flex: 1; min-width: 0; }
    .pdf-item-name { font-weight: 600; margin-bottom: 0.25rem; }
    .pdf-item-meta { font-size: 0.85rem; color: var(--text-secondary); }
    .pdf-item-actions { display: flex; gap: 0.5rem; }
    .pdf-empty { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); }
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 2rem; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover { border-color: var(--accent); background: rgba(0,255,159,0.05); }
    .upload-zone input { display: none; }
    .link-open-section {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem; margin-bottom: 1.5rem;
    }
    .link-open-label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
    .link-open-hint { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem; }
    .link-open-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .link-open-input {
      flex: 1; min-width: 200px; padding: 0.6rem 1rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary);
      font-size: 0.95rem;
    }
    .link-open-input:focus { outline: none; border-color: var(--accent); }
    .upload-error {
      background: rgba(255,71,87,0.15); border: 1px solid var(--error);
      border-radius: var(--radius-sm); padding: 0.75rem 1rem;
      margin-bottom: 1rem; color: var(--error); font-size: 0.9rem;
    }
    .camera-section {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 1.5rem; overflow: hidden;
    }
    .camera-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem; cursor: pointer;
      transition: background 0.2s;
    }
    .camera-section-header:hover { background: rgba(0,255,159,0.06); }
    .camera-section-header h2 { font-size: 1.1rem; margin: 0; display: flex; align-items: center; gap: 0.5rem; }
    .camera-section-header .toggle-icon { transition: transform 0.2s; font-size: 1rem; }
    .camera-section.expanded .toggle-icon { transform: rotate(180deg); }
    .camera-section-body { display: none; padding: 0 1rem 1rem; }
    .camera-section.expanded .camera-section-body { display: block; }
    .camera-iframe-wrap {
      border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border);
      background: var(--bg-secondary); min-height: 400px;
    }
    .camera-iframe-wrap iframe { width: 100%; height: 500px; border: none; display: block; }
    .camera-hint { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="app">
    <div class="dashboard-page">
      <header class="dashboard-header">
        <h1>📄 Мои PDF</h1>
        <div class="dashboard-actions">
          <label class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept="application/pdf">
            <span>📤 Загрузить PDF</span>
          </label>
          <button id="logoutBtn" class="btn btn-secondary">Выйти</button>
        </div>
      </header>

      <div class="dashboard-cards">
        <button type="button" class="dashboard-card" id="goCameraBtn" style="border:none;font:inherit;cursor:pointer;width:100%">
          <h2>✏️ Режим рисования</h2>
          <p>Рисование поверх видео с камеры</p>
        </button>
        <div class="dashboard-card" style="cursor:default;opacity:0.9">
          <h2>📄 PDF</h2>
          <p>Работа с документами ниже</p>
        </div>
      </div>

      <div class="camera-section" id="cameraSection">
        <div class="camera-section-header" id="cameraSectionToggle">
          <h2>📷 Kamera</h2>
          <span class="toggle-icon">▼</span>
        </div>
        <div class="camera-section-body">
          <div class="camera-iframe-wrap">
            <iframe id="cameraIframe" src="about:blank" title="Kamera ve çizim"></iframe>
          </div>
          <p class="camera-hint">Kamera açıldığında el hareketleriniz takip edilir. Parmak ile hareket ettirerek çizim yapabilirsiniz.</p>
        </div>
      </div>

      <div class="link-open-section">
        <label class="link-open-label">🔗 Ссылка на PDF или общий холст</label>
        <p class="link-open-hint">Вставьте ссылку — откроется PDF или общий холст. Вы и ваш друг сможете рисовать вместе в реальном времени.</p>
        <div class="link-open-row">
          <input type="text" id="pdfLinkInput" class="link-open-input" placeholder="...index.html?id=xxx или ...index.html?canvas=xxx">
          <button type="button" id="openLinkBtn" class="btn btn-primary">Открыть</button>
        </div>
      </div>

      <div id="uploadError" class="upload-error" style="display:none"></div>
      <div id="pdfList" class="pdf-list"></div>
      <div id="pdfEmpty" class="pdf-empty" style="display:none">
        Пока нет PDF. Загрузите выше.
      </div>
    </div>
  </div>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
