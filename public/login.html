<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrawFlow | Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=10">
  <style>
    :root {
      --auth-cyan: #06b6d4;
      --auth-blue: #3b82f6;
      --auth-font: 'Inter', -apple-system, system-ui, sans-serif;
    }

    html {
      background: #030712;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--auth-font);
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      color: #e5e7eb;
      overscroll-behavior: none;
    }

    .auth-shell {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      width: 100%;
      background: linear-gradient(to bottom right, #030712, #111827 45%, #000);
    }

    @media (min-width: 1024px) {
      .auth-shell {
        flex-direction: row;
      }
    }

    .auth-visual {
      display: none;
      position: relative;
      width: 50%;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      align-self: stretch;
    }

    @media (min-width: 1024px) {
      .auth-visual {
        display: block;
      }
    }

    .auth-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom right, rgba(6, 182, 212, 0.1), transparent 50%, rgba(59, 130, 246, 0.1));
      z-index: 10;
      pointer-events: none;
    }

    .auth-visual::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 10;
      pointer-events: none;
    }

    .auth-visual img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.02);
    }

    .auth-visual-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 3rem;
      z-index: 20;
      pointer-events: none;
    }

    .auth-visual-caption h2 {
      margin: 0 0 0.75rem;
      font-size: 1.75rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
    }

    .auth-visual-caption p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.7);
      max-width: 28rem;
    }

    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      min-height: 0;
    }

    .auth-main-inner {
      width: 100%;
      max-width: 28rem;
    }

    .auth-glass {
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .auth-head h1 {
      margin: 0 0 0.5rem;
      font-size: 1.875rem;
      font-weight: 600;
      color: #fff;
    }

    .auth-head p {
      margin: 0 0 1.75rem;
      font-size: 0.875rem;
      color: #9ca3af;
    }

    .auth-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 0.75rem;
      padding: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 0.55rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      background: transparent;
      border: none;
      color: #9ca3af;
      font-family: var(--auth-font);
      font-size: 0.875rem;
      font-weight: 600;
      transition: color 0.2s, background 0.2s;
    }

    .auth-tab.active {
      background: rgba(6, 182, 212, 0.25);
      color: #fff;
      box-shadow: 0 0 0 1px rgba(6, 182, 212, 0.35);
    }

    .auth-tab:not(.active):hover {
      color: #e5e7eb;
    }

    .auth-field {
      margin-bottom: 1.25rem;
    }

    .auth-field label {
      display: block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #d1d5db;
      margin-bottom: 0.5rem;
    }

    .auth-field input {
      width: 100%;
      box-sizing: border-box;
      height: 2.75rem;
      padding: 0 0.875rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 0.9375rem;
      font-family: var(--auth-font);
      transition: border-color 0.2s, background 0.2s;
    }

    .auth-field input::placeholder {
      color: #6b7280;
    }

    .auth-field input:focus {
      outline: none;
      border-color: rgba(6, 182, 212, 0.5);
      background: rgba(255, 255, 255, 0.08);
    }

    .auth-field input:disabled {
      opacity: 0.6;
    }

    #signupNameWrap {
      display: none;
    }

    #signupNameWrap.visible {
      display: block;
    }

    #authMessage {
      font-size: 0.8125rem;
      margin-bottom: 0.75rem;
      min-height: 1.25em;
    }

    .auth-error { color: #f87171; }
    .auth-success { color: #22d3ee; }

    .auth-submit {
      width: 100%;
      height: 2.75rem;
      margin-top: 0.5rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: var(--auth-font);
      cursor: pointer;
      color: #fff;
      background: linear-gradient(to right, var(--auth-cyan), var(--auth-blue));
      box-shadow: 0 10px 25px -5px rgba(6, 182, 212, 0.25);
      transition: filter 0.2s, box-shadow 0.2s, opacity 0.2s;
    }

    .auth-submit:hover:not(:disabled) {
      filter: brightness(1.08);
      box-shadow: 0 12px 28px -5px rgba(6, 182, 212, 0.35);
    }

    .auth-submit:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .auth-submit .spin {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      margin-right: 0.5rem;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: authSpin 0.7s linear infinite;
      vertical-align: -2px;
    }

    @keyframes authSpin {
      to { transform: rotate(360deg); }
    }

  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-visual" aria-hidden="true">
      <img
        src="/images/login-hero.jpg"
        alt=""
        width="1600"
        height="2400"
        decoding="async"
        fetchpriority="high"
      >
      <div class="auth-visual-caption">
        <h2>Touch-Free Control</h2>
        <p>Experience the future of interaction with gesture-based technology</p>
      </div>
    </div>
    <div class="auth-main">
      <div class="auth-main-inner">
        <div class="auth-glass">
          <div class="auth-head">
            <h1 id="authTitle">Вход</h1>
            <p id="authSubtitle">Платформа рисования жестами DrawFlow</p>
          </div>
          <div class="auth-tabs" role="tablist">
            <button type="button" class="auth-tab active" id="tabLogin" role="tab" aria-selected="true">Вход</button>
            <button type="button" class="auth-tab" id="tabSignup" role="tab" aria-selected="false">Регистрация</button>
          </div>
          <form class="auth-form" id="authForm">
            <div class="auth-field" id="signupNameWrap">
              <label for="signupName">Имя (необязательно)</label>
              <input type="text" id="signupName" placeholder="Ваше имя" autocomplete="name">
            </div>
            <div class="auth-field">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="auth-field">
              <label for="password">Пароль</label>
              <input type="password" id="password" placeholder="Минимум 6 символов" required autocomplete="current-password">
            </div>
            <div id="authMessage"></div>
            <button type="submit" class="auth-submit" id="submitBtn">Войти</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script type="module">
    import { supabase } from './supabase-config.js';

    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const tabLogin = document.getElementById('tabLogin');
    const tabSignup = document.getElementById('tabSignup');
    const form = document.getElementById('authForm');
    const submitBtn = document.getElementById('submitBtn');
    const msgEl = document.getElementById('authMessage');
    const signupNameWrap = document.getElementById('signupNameWrap');
    const signupName = document.getElementById('signupName');
    const passwordInput = document.getElementById('password');
    let isSignup = false;

    function setMode(signup) {
      isSignup = signup;
      tabLogin.classList.toggle('active', !signup);
      tabSignup.classList.toggle('active', signup);
      tabLogin.setAttribute('aria-selected', (!signup).toString());
      tabSignup.setAttribute('aria-selected', signup.toString());
      signupNameWrap.classList.toggle('visible', signup);
      authTitle.textContent = signup ? 'Регистрация' : 'Вход';
      authSubtitle.textContent = signup
        ? 'Создайте аккаунт для сохранения документов'
        : 'Войдите в платформу рисования жестами';
      submitBtn.textContent = signup ? 'Зарегистрироваться' : 'Войти';
      passwordInput.autocomplete = signup ? 'new-password' : 'current-password';
      msgEl.textContent = '';
      msgEl.className = '';
    }

    tabLogin.addEventListener('click', () => setMode(false));
    tabSignup.addEventListener('click', () => setMode(true));

    if (!supabase) {
      msgEl.innerHTML = '<span class="auth-error">Supabase не настроен.</span>';
    } else {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      if (accessToken) {
        await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
        const q = new URLSearchParams(window.location.search);
        const redirect = q.get('redirect');
        window.location.replace(redirect || '/dashboard.html');
      }
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      if (loading) {
        submitBtn.innerHTML = '<span class="spin" aria-hidden="true"></span>' + (isSignup ? 'Регистрация…' : 'Вход…');
      } else {
        submitBtn.textContent = isSignup ? 'Зарегистрироваться' : 'Войти';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!supabase) return;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      msgEl.textContent = '';
      msgEl.className = '';

      if (password.length < 6) {
        msgEl.textContent = 'Пароль не короче 6 символов';
        msgEl.className = 'auth-error';
        return;
      }

      setLoading(true);
      try {
        if (isSignup) {
          const name = (signupName?.value || '').trim();
          const options = name ? { data: { full_name: name } } : {};
          const { data, error } = await supabase.auth.signUp({ email, password, options });
          if (error) throw error;
          if (data?.session) {
            const q = new URLSearchParams(window.location.search);
            const redirect = q.get('redirect');
            window.location.href = redirect || '/dashboard.html';
          } else {
            msgEl.textContent = 'Регистрация успешна! Проверьте почту или войдите.';
            msgEl.className = 'auth-success';
          }
        } else {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          const q = new URLSearchParams(window.location.search);
          const redirect = q.get('redirect');
          window.location.href = redirect || '/dashboard.html';
        }
      } catch (err) {
        msgEl.textContent = err.message || 'Произошла ошибка';
        msgEl.className = 'auth-error';
      }
      setLoading(false);
    });
  </script>
</body>
</html>
