<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrawFlow | Мото-дуэль</title>
  <style>
    html { color-scheme: dark; }
    :root {
      --bg: #08090e;
      --panel: rgba(19, 22, 32, 0.9);
      --border: rgba(255,255,255,0.14);
      --text: #eef2ff;
      --muted: #9ca3af;
      --accent: #6366f1;
      --accent2: #f97316;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #07080d;
      background: radial-gradient(circle at 20% 10%, #182032 0%, #07080d 60%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: #11131c;
    }
    .title { font-weight: 700; }
    .actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    button, a.btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }
    button.primary {
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      color: #fff;
    }
    .status {
      padding: 8px 12px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: rgba(8, 10, 15, 0.78);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stage { flex: 1; min-height: 0; }
    canvas { width: 100%; height: 100%; display: block; background: #000; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Мото-дуэль (2 игрока)</div>
    <div class="actions">
      <button id="restartBtn">Рестарт</button>
      <a class="btn" href="/game-select.html">Назад</a>
    </div>
  </div>
  <div class="status" id="statusText">Загрузка... Управление: правая рука — газ, наклон рук (одна выше, другая ниже) — поворот.</div>
  <div class="status" id="timerText">Время: 0.0 c</div>
  <div class="stage">
    <video id="video" autoplay playsinline muted style="display:none"></video>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
  </div>
  <script type="module" src="/moto-duel.js"></script>
</body>
</html>
