<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrawFlow | Режим игры</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=17">
  <script type="module">
    import { supabase } from './supabase-config.js';
    if (supabase) {
      const hash = window.location.hash.substring(1);
      const hp = new URLSearchParams(hash);
      const accessToken = hp.get('access_token');
      const refreshToken = hp.get('refresh_token');
      if (accessToken) {
        await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
        window.history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    }
  </script>
  <style>
    :root {
      --dash-bg: #0a0a0b;
      --dash-bg-end: #12121a;
      --dash-glass: rgba(255, 255, 255, 0.055);
      --dash-glass-border: rgba(255, 255, 255, 0.09);
      --dash-glass-hover: rgba(255, 255, 255, 0.09);
      --dash-surface: rgba(24, 24, 27, 0.72);
      --dash-border-hover: rgba(255, 255, 255, 0.14);
      --dash-accent: #7c7fd9;
      --dash-accent-deep: #5b5fc7;
      --dash-accent-light: #9d9fef;
      --dash-accent-glow: rgba(91, 95, 199, 0.28);
      --dash-cyan: #5ac8d4;
      --dash-green: #5eead4;
      --dash-text: #fafafa;
      --dash-text-dim: #a1a1aa;
      --dash-text-mid: #d4d4d8;
      --dash-radius: 16px;
      --dash-radius-sm: 12px;
      --dash-font: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
      --game-canvas-bg: #f4f5f9;
    }

    * { box-sizing: border-box; }

    html {
      margin: 0;
      height: 100%;
      overflow: hidden;
      color-scheme: dark;
      background-color: var(--dash-bg);
      background: linear-gradient(168deg, #0c0c0e 0%, #0f0f12 42%, #0a0a0d 100%);
      font-family: var(--dash-font);
      color: var(--dash-text);
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--dash-font);
      background-color: var(--dash-bg);
      background: linear-gradient(168deg, #0c0c0e 0%, #0f0f12 42%, #0a0a0d 100%);
      color: var(--dash-text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
    }

    .liquid-glass {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .liquid-glass .df-ambient-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    .liquid-glass .blob {
      position: absolute;
      border-radius: 50%;
      opacity: 0.42;
      z-index: 2;
    }

    .liquid-glass .blob-1 {
      top: -15%;
      right: -10%;
      width: 55%;
      height: 65%;
      background: radial-gradient(ellipse 80% 70% at 30% 40%, rgba(124, 108, 245, 0.38) 0%, rgba(90, 200, 212, 0.14) 45%, transparent 68%);
      filter: blur(68px);
      animation: gameBlobFloat1 26s ease-in-out infinite;
    }

    .liquid-glass .blob-2 {
      bottom: -20%;
      left: -15%;
      width: 50%;
      height: 60%;
      background: radial-gradient(ellipse 75% 65% at 60% 50%, rgba(45, 212, 191, 0.22) 0%, rgba(91, 95, 199, 0.14) 48%, transparent 68%);
      filter: blur(64px);
      animation: gameBlobFloat2 32s ease-in-out infinite;
    }

    .liquid-glass .blob-3 {
      top: 35%;
      left: 20%;
      width: 35%;
      height: 40%;
      background: radial-gradient(ellipse at center, rgba(180, 170, 248, 0.2) 0%, transparent 72%);
      filter: blur(48px);
      animation: gameBlobFloat3 22s ease-in-out infinite;
      opacity: 0.85;
    }

    @keyframes gameBlobFloat3 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(8%, -6%); }
    }

    @keyframes gameBlobFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-5%, 4%) scale(1.03); }
    }

    @keyframes gameBlobFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(4%, -5%) scale(1.04); }
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 22% 18%, rgba(124, 108, 245, 0.1) 0%, transparent 46%),
        radial-gradient(ellipse at 78% 82%, rgba(45, 212, 191, 0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: gameBgDrift 32s ease-in-out infinite alternate;
    }

    @keyframes gameBgDrift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-3%, -3%); }
    }

    .game-app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      max-width: none;
      margin: 0;
      padding: max(0.5rem, env(safe-area-inset-top, 0px)) 0.75rem max(0.5rem, env(safe-area-inset-bottom, 0px));
    }

    .game-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-shrink: 0;
      padding: 0.2rem 0 0.5rem;
    }

    .game-brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      text-decoration: none;
      color: inherit;
      min-width: 0;
    }

    .game-brand-icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(124, 108, 245, 0.95), rgba(90, 200, 212, 0.88));
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 4px 18px var(--dash-accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .game-brand-text {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--dash-accent-light);
    }

    .game-brand-sub {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--dash-text-dim);
      margin-top: 0.15rem;
      -webkit-text-fill-color: var(--dash-text-dim);
    }

    .game-nav-actions {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-shrink: 0;
    }

    .game-icon-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--dash-radius-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--dash-text-mid);
      background: rgba(28, 28, 40, 0.95);
      border: 1px solid var(--dash-glass-border);
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }

    .game-icon-btn:hover {
      color: var(--dash-text);
      background: var(--dash-glass-hover);
      border-color: var(--dash-border-hover);
    }

    .game-link-btn {
      padding: 0.55rem 0.95rem;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: var(--dash-radius-sm);
      text-decoration: none;
      color: var(--dash-text-mid);
      background: rgba(28, 28, 40, 0.95);
      border: 1px solid var(--dash-glass-border);
      white-space: nowrap;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }

    .game-link-btn:hover {
      color: var(--dash-text);
      background: var(--dash-glass-hover);
      border-color: var(--dash-border-hover);
    }

    .game-main {
      position: relative;
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .game-workspace {
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .game-sidebar-overlay {
      position: absolute;
      left: 0.35rem;
      top: 0.35rem;
      z-index: 30;
      width: min(292px, calc(100% - 0.85rem));
      max-height: calc(100% - 0.75rem);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      pointer-events: auto;
    }

    @media (min-width: 780px) {
      .game-sidebar-overlay {
        width: min(300px, calc(100% - 1rem));
      }
    }

    .game-panel {
      background: rgba(22, 22, 32, 0.98);
      border: 1px solid var(--dash-glass-border);
      border-radius: var(--dash-radius);
      padding: 1rem 1.1rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.14);
      flex-shrink: 0;
    }

    .game-panel.game-sidebar {
      border-left: 3px solid rgba(108, 92, 231, 0.45);
      background: linear-gradient(165deg, rgba(20, 20, 30, 0.94) 0%, rgba(14, 14, 22, 0.88) 100%);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      margin: 0;
    }

    .game-panel.game-stage {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .game-controls-inner {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .game-row-top {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 0.65rem 0.75rem;
    }

    .game-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-width: 0;
      flex: 1 1 auto;
    }

    .game-field--shape {
      position: relative;
      flex: 1 1 100%;
    }

    .game-field label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--dash-text-dim);
    }

    .game-shape-select-vh {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
      opacity: 0;
      pointer-events: none;
    }

    .game-shape-picker {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.45rem;
    }

    .game-shape-opt {
      width: 46px;
      height: 46px;
      min-width: 46px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--dash-radius-sm);
      border: 1px solid var(--dash-glass-border);
      background: rgba(0, 0, 0, 0.28);
      color: var(--dash-text-mid);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .game-shape-opt svg {
      width: 22px;
      height: 22px;
    }

    .game-shape-opt:hover {
      color: var(--dash-text);
      background: var(--dash-glass-hover);
      border-color: var(--dash-border-hover);
    }

    .game-shape-opt--active,
    .game-shape-opt[aria-pressed="true"] {
      color: var(--dash-accent-light);
      border-color: rgba(108, 92, 231, 0.55);
      background: rgba(108, 92, 231, 0.12);
      box-shadow: 0 0 0 2px rgba(108, 92, 231, 0.2);
    }

    .game-shape-opt:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.35);
    }

    .game-sidebar .game-controls-inner {
      gap: 0.85rem;
    }

    .game-sidebar .game-shape-picker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
    }

    .game-sidebar .game-shape-opt {
      width: 100%;
      min-width: 0;
      height: 44px;
    }

    .game-actions-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.65rem;
    }

    .game-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      flex: 0 1 auto;
      justify-content: flex-start;
    }

    .game-sidebar .game-btns {
      flex-direction: column;
      width: 100%;
    }

    .game-sidebar .game-btn {
      width: 100%;
      justify-content: center;
    }

    .game-btns--actions {
      flex: 0 1 auto;
    }

    .game-btn {
      padding: 0.55rem 0.95rem;
      border-radius: var(--dash-radius-sm);
      border: none;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.2s, filter 0.2s;
      white-space: nowrap;
    }

    .game-btn:active { transform: scale(0.98); }

    .game-btn--primary {
      background: linear-gradient(135deg, var(--dash-accent), #8b7cf7);
      color: #fff;
      box-shadow: 0 4px 16px rgba(108, 92, 231, 0.35);
    }

    .game-btn--primary:hover {
      filter: brightness(1.05);
    }

    .game-btn--ghost {
      background: var(--dash-glass);
      color: var(--dash-text);
      border: 1px solid var(--dash-glass-border);
    }

    .game-btn--ghost:hover {
      background: var(--dash-glass-hover);
      border-color: var(--dash-border-hover);
    }

    .game-gesture-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 0.85rem;
      padding-top: 0.85rem;
      border-top: 1px solid var(--dash-glass-border);
    }

    .game-sidebar .game-gesture-bar {
      flex-direction: column;
      align-items: flex-start;
      padding-top: 0.65rem;
    }

    .game-gesture-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--dash-text-mid);
    }

    .game-switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 26px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .game-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .game-switch-slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--dash-glass-border);
      transition: background 0.2s, border-color 0.2s;
    }

    .game-switch-slider::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      transition: transform 0.2s ease;
    }

    .game-switch input:checked + .game-switch-slider {
      background: linear-gradient(135deg, var(--dash-accent), #8b7cf7);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .game-switch input:checked + .game-switch-slider::after {
      transform: translate(20px, -50%);
    }

    .game-switch input:focus-visible + .game-switch-slider {
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.35);
    }

    .game-gesture-hint {
      font-size: 0.75rem;
      color: var(--dash-text-dim);
      flex: 1 1 140px;
      min-width: 0;
    }

    .game-gesture-status {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--dash-accent-light);
      flex: 1 1 auto;
      min-width: 0;
    }

    .game-stage {
      padding: 0.65rem 0.75rem 0.75rem;
      gap: 0.45rem;
    }

    .game-canvas-outer {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      overflow: visible;
    }

    .game-canvas-wrap {
      position: relative;
      width: 100%;
      flex-shrink: 0;
      box-sizing: border-box;
      border-radius: var(--dash-radius-sm);
      overflow: hidden;
      background: var(--game-canvas-bg);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.65),
        0 8px 28px rgba(0, 0, 0, 0.2);
    }

    #gameCanvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .game-hint {
      margin: 0;
      font-size: 0.8rem;
      color: var(--dash-text-dim);
      line-height: 1.5;
    }

    .game-result {
      min-height: 3.1rem;
      padding: 0.95rem 1.05rem;
      border-radius: var(--dash-radius-sm);
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid var(--dash-glass-border);
      font-size: 0.92rem;
      line-height: 1.45;
      overflow-y: auto;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .game-result--inline {
      flex: 1 1 auto;
      max-width: 100%;
      min-width: 0;
      min-height: 3.1rem;
      padding: 0.65rem 0.9rem;
    }

    .game-sidebar .game-result--inline {
      flex: none;
      max-height: 8.5rem;
    }

    .game-result.game-result--visible {
      visibility: visible;
      opacity: 1;
    }

    .game-result strong {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--dash-accent-light);
    }

    .game-result-detail {
      display: block;
      margin-top: 0.35rem;
      font-size: 0.8rem;
      color: var(--dash-text-dim);
    }

    @media (max-width: 640px) {
      .game-nav {
        flex-wrap: wrap;
        padding-bottom: 0.65rem;
      }

      .game-btn {
        flex: 1 1 calc(50% - 0.25rem);
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .game-sidebar .game-btn {
        flex: none;
        width: 100%;
      }

      .game-btn--primary {
        flex: 1 1 100%;
      }

      .game-sidebar .game-btn--primary {
        flex: none;
        width: 100%;
      }

    }

    @media (prefers-reduced-motion: reduce) {
      .liquid-glass .blob,
      .liquid-glass .blob-1,
      .liquid-glass .blob-2,
      .liquid-glass .blob-3 {
        animation: none;
      }
      body::before {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="liquid-glass" aria-hidden="true">
    <canvas class="df-ambient-canvas"></canvas>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="game-app">
    <nav class="game-nav">
      <a class="game-brand" href="dashboard.html">
        <span class="game-brand-icon" aria-hidden="true">✎</span>
        <span>
          <span class="game-brand-text">Режим игры</span>
          <span class="game-brand-sub">Повтори фигуру</span>
        </span>
      </a>
      <div class="game-nav-actions">
        <a class="game-icon-btn" href="help.html" title="Справка и горячие клавиши" aria-label="Справка">?</a>
        <a class="game-link-btn" href="dashboard.html">Документы</a>
      </div>
    </nav>
    <main class="game-main">
      <div class="game-workspace">
        <section class="game-panel game-stage" aria-label="Холст">
          <div class="game-canvas-outer" id="gameCanvasOuter">
            <aside id="gameSidebarOverlay" class="game-sidebar-overlay" aria-label="Панель режима игры">
              <section class="game-panel game-sidebar" aria-label="Фигура, жесты и проверка">
                <div class="game-controls-inner">
                  <div class="game-row-top">
                    <div class="game-field game-field--shape">
                      <label for="gameShapeSelect">Фигура</label>
                      <div id="gameShapePicker" class="game-shape-picker" role="group" aria-label="Выбор фигуры"></div>
                      <select id="gameShapeSelect" class="game-shape-select-vh" aria-label="Выбор фигуры"></select>
                    </div>
                  </div>
                  <div class="game-gesture-bar">
                    <span class="game-gesture-label">Жесты (камера)</span>
                    <label class="game-switch" title="Щепотка указательного и большого пальца" aria-label="Включить рисование жестами">
                      <input type="checkbox" id="gameGestureToggle" />
                      <span class="game-switch-slider" aria-hidden="true"></span>
                    </label>
                    <span class="game-gesture-hint">Как в режиме рисования: наведение указателем, щипок — нажатие по кнопке.</span>
                    <span class="game-gesture-status" id="gameGestureStatus" aria-live="polite"></span>
                  </div>
                  <div class="game-actions-row" aria-label="Действия">
                    <div class="game-btns game-btns--actions">
                      <button type="button" class="game-btn game-btn--primary" id="gameCheckBtn">Проверить</button>
                      <button type="button" class="game-btn game-btn--ghost" id="gameClearBtn">Очистить</button>
                      <button type="button" class="game-btn game-btn--ghost" id="gameRandomBtn">Случайная</button>
                    </div>
                    <div class="game-result game-result--inline" id="gameResult" role="status" aria-live="polite"></div>
                  </div>
                </div>
              </section>
            </aside>
            <div class="game-canvas-wrap" id="gameCanvasWrap">
              <canvas id="gameCanvas" width="480" height="480" aria-label="Холст: нарисуйте фигуру по образцу"></canvas>
            </div>
          </div>
          <p class="game-hint" id="gameHint"></p>
        </section>
      </div>
    </main>
  </div>
  <script type="module" src="df-ambient.js?v=6"></script>
