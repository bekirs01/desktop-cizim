<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рисование на рабочем столе</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: transparent;
      font-family: system-ui, sans-serif;
    }
    #drawCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .toolbar {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      background: rgba(26, 26, 31, 0.9);
      border: 1px solid #2a2a35;
      border-radius: 8px;
      padding: 8px;
      gap: 8px;
    }
    .toolbar-toggle {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid #2a2a35;
      background: #1a1a1f;
      color: #f0f0f5;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .toolbar-toggle:hover { border-color: #00ff9f; }
    .toolbar-content {
      display: none;
      flex-direction: column;
      gap: 8px;
      min-width: 160px;
    }
    .toolbar.expanded .toolbar-content { display: flex; }
    .toolbar-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .toolbar-row label {
      font-size: 11px;
      color: #a0a0b0;
      text-transform: uppercase;
    }
    .toolbar-colors { display: flex; flex-wrap: wrap; gap: 4px; max-width: 180px; align-items: center; }
    .color-preset { width: 24px; height: 24px; border-radius: 6px; border: 2px solid #2a2a35; cursor: pointer; padding: 0; flex-shrink: 0; }
    .color-preset:hover { border-color: #00ff9f; }
    .color-preset.active { border-color: #00ff9f; box-shadow: 0 0 0 1px #00ff9f; }
    .toolbar-colors .color-picker { width: 24px; height: 24px; border-radius: 6px; border: 2px solid #2a2a35; padding: 2px; cursor: pointer; background: #16161a; }
    .toolbar-colors .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
    .toolbar-colors .color-picker::-webkit-color-swatch { border-radius: 4px; border: none; }
    .toolbar-row input[type="range"] { width: 100%; }
    .shape-btns { display: flex; flex-wrap: wrap; gap: 4px; max-width: 180px; }
    .shape-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid #2a2a35;
      background: #16161a;
      color: #f0f0f5;
      font-size: 14px;
      cursor: pointer;
    }
    .shape-btn:hover { border-color: #00ff9f; }
    .shape-btn.active { background: #00ff9f; color: #0d0d0f; }
    .clear-btn {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #2a2a35;
      background: #16161a;
      color: #f0f0f5;
      cursor: pointer;
      font-size: 13px;
    }
    .clear-btn:hover { border-color: #ff4757; background: rgba(255,71,87,0.2); }
    .camera-preview {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 100px;
      height: 75px;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid #2a2a35;
      z-index: 100;
      background: #1a1a1f;
    }
    .camera-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .camera-preview canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #video { display: none; }
    @media (max-width: 720px) {
      .toolbar {
        top: auto;
        bottom: max(10px, env(safe-area-inset-bottom, 0px));
        left: 8px;
        right: 8px;
        width: auto;
      }
      .toolbar.expanded .toolbar-content {
        max-height: 48vh;
        overflow: auto;
      }
      .camera-preview {
        width: 80px;
        height: 60px;
        right: 8px;
        bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      }
    }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <button class="toolbar-toggle" id="toolbarToggle">⚙️</button>
    <div class="toolbar-content">
      <div class="toolbar-row">
        <label>Цвет</label>
        <div class="toolbar-colors">
          <button type="button" class="color-preset active" data-color="#00ff9f" style="background:#00ff9f"></button>
          <button type="button" class="color-preset" data-color="#ff6b9d" style="background:#ff6b9d"></button>
          <button type="button" class="color-preset" data-color="#6b9dff" style="background:#6b9dff"></button>
          <button type="button" class="color-preset" data-color="#ffd93d" style="background:#ffd93d"></button>
          <button type="button" class="color-preset" data-color="#ff4757" style="background:#ff4757"></button>
          <button type="button" class="color-preset" data-color="#ffffff" style="background:#fff;border-color:#888"></button>
          <button type="button" class="color-preset" data-color="#9b59b6" style="background:#9b59b6"></button>
          <button type="button" class="color-preset" data-color="#1abc9c" style="background:#1abc9c"></button>
          <button type="button" class="color-preset" data-color="#e74c3c" style="background:#e74c3c"></button>
          <button type="button" class="color-preset" data-color="#3498db" style="background:#3498db"></button>
          <button type="button" class="color-preset" data-color="#2ecc71" style="background:#2ecc71"></button>
          <button type="button" class="color-preset" data-color="#000000" style="background:#000;border-color:#444"></button>
          <input type="color" id="toolbarColor" class="color-picker" value="#00ff9f" title="Полная палитра">
        </div>
      </div>
      <div class="toolbar-row">
        <label>Толщина</label>
        <input type="range" id="toolbarSize" min="1" max="20" value="4">
        <span id="toolbarSizeVal">4</span>
      </div>
      <div class="toolbar-row">
        <button id="clearBtn" class="clear-btn">🗑️ Очистить</button>
      </div>
      <div class="toolbar-row">
        <label>Фигуры</label>
        <div class="shape-btns">
          <button class="shape-btn active" data-shape="free">✏️</button>
          <button class="shape-btn" data-shape="rect">▢</button>
          <button class="shape-btn" data-shape="ellipse">⬭</button>
          <button class="shape-btn" data-shape="circle">⭕</button>
          <button class="shape-btn" data-shape="line">📏</button>
          <button class="shape-btn" data-shape="arrow">➤</button>
          <button class="shape-btn" data-shape="triangle">△</button>
        </div>
      </div>
    </div>
  </div>
  <div class="camera-preview" id="cameraPreview">
    <video id="video" playsinline></video>
    <canvas id="previewCanvas"></canvas>
  </div>
  <canvas id="drawCanvas"></canvas>
  <script type="module" src="desktop-overlay.js"></script>
</body>
</html>
