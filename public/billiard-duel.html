<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrawFlow | Бильярд 8-ball</title>
  <style>
    html { color-scheme: dark; }
    :root{
      --bg:#090b12; --panel:rgba(18,22,33,.9); --border:rgba(255,255,255,.12); --text:#eef2ff; --muted:#94a3b8;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background-color:#090b12;background:radial-gradient(circle at 15% 15%,#1f2a44 0%,#090b12 60%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column}
    .top{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;background:#0d111c;border-bottom:1px solid var(--border)}
    .title{font-weight:700}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    button,a.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:10px;padding:8px 12px;font-size:14px;cursor:pointer;text-decoration:none}
    button.primary{background:linear-gradient(135deg,#6366f1,#818cf8);border-color:transparent}
    .status{padding:8px 12px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stage{flex:1;min-height:0;position:relative}
    canvas{width:100%;height:100%;display:block;background:#000}
    video{display:none}
  </style>
</head>
<body>
  <div class="top">
    <div class="title">Бильярд 8-ball (2 игрока)</div>
    <div class="actions">
      <button id="resetBtn">Рестарт</button>
      <a class="btn" href="/game-select.html">Назад</a>
    </div>
  </div>
  <div class="status" id="statusText">Запуск... Нажмите «Старт».</div>
  <div class="status" id="infoText">Игрок 1: ? | Игрок 2: ?</div>
  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
  </div>
  <script type="module" src="/billiard-duel.js"></script>
</body>
</html>
