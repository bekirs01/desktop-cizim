<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrawFlow | Просмотр PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=17">
  <style>
    .view-container { padding: 1rem; max-width: 900px; margin: 0 auto; }
    .view-error { color: var(--error, #ff4757); padding: 2rem; text-align: center; }
    .view-loading { text-align: center; padding: 3rem; color: var(--text-secondary); }
    .view-toolbar { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .view-toolbar span { color: var(--text-secondary); }
    .view-pdf-wrap { background: #111; border-radius: var(--radius); overflow: auto; position: relative; }
    .view-pdf-wrap { position: relative; }
    .view-pdf-wrap #pdfCanvas { display: block; margin: 0 auto; max-width: 100%; }
    .view-pdf-wrap #drawCanvas { margin: 0 auto; display: block; }
    .view-password { text-align: center; padding: 2rem; max-width: 320px; margin: 2rem auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
    .view-password h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .view-password p { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem; }
    .view-password input { width: 100%; padding: 0.65rem 1rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); font-size: 1rem; margin-bottom: 0.5rem; box-sizing: border-box; }
    .view-password input:focus { outline: none; border-color: var(--accent); }
    .view-password-error { color: var(--error); font-size: 0.85rem; margin-bottom: 0.5rem; }
    .view-password .btn { width: 100%; }
    @media (max-width: 700px) {
      .view-container {
        padding: 0.55rem;
      }
      .view-toolbar {
        position: sticky;
        top: 0;
        z-index: 5;
        background: rgba(10, 10, 16, 0.85);
        backdrop-filter: blur(8px);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.4rem;
      }
      .view-pdf-wrap {
        max-height: calc(100dvh - 190px);
      }
      .view-toolbar .btn {
        min-height: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>DrawFlow</h1>
      <div class="header-right">
        <a href="/dashboard.html" class="btn btn-secondary">&larr; Документы</a>
      </div>
    </header>
    <main class="main">
      <div class="view-container">
        <div id="viewError" class="view-error" style="display:none"></div>
        <div id="viewLoading" class="view-loading">Загрузка PDF…</div>
        <div id="viewPassword" class="view-password" style="display:none">
          <h3>&#x1F512; Пароль для доступа</h3>
          <p>Этот PDF защищён паролем.</p>
          <input type="password" id="viewPasswordInput" placeholder="Пароль" autocomplete="current-password">
          <p id="viewPasswordError" class="view-password-error" style="display:none">Неверный пароль</p>
          <button type="button" id="viewPasswordSubmit" class="btn btn-primary">Открыть</button>
        </div>
        <div id="viewContent" style="display:none">
          <div class="view-toolbar">
            <button id="prevBtn" class="btn btn-secondary btn-small" disabled>◀</button>
            <span id="pageInfo">-</span>
            <button id="nextBtn" class="btn btn-secondary btn-small" disabled>▶</button>
          </div>
          <div class="view-pdf-wrap" id="pdfWrap">
            <div class="view-pdf-canvas-wrap" style="position:relative;display:inline-block;margin:0 auto">
              <canvas id="pdfCanvas"></canvas>
              <canvas id="drawCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></canvas>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="view.js?v=1"></script>
</body>
</html>
