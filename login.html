<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | Система рисования</title>
  <link rel="stylesheet" href="style.css?v=3">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow);
    }
    .auth-card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .auth-card p { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .auth-form { display: flex; flex-direction: column; gap: 1rem; }
    .auth-form input {
      width: 100%; padding: 0.75rem 1rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-secondary);
      color: var(--text-primary); font-size: 1rem; box-sizing: border-box;
    }
    .auth-form input:focus { outline: none; border-color: var(--accent); }
    .auth-btn { padding: 0.75rem 1.5rem; border-radius: var(--radius-sm); font-size: 1rem; cursor: pointer; font-weight: 600; border: none; }
    .auth-btn-primary { background: var(--accent); color: #0d0d0f; }
    .auth-btn-primary:hover { background: var(--accent-dim); }
    .auth-btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
    .auth-btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .auth-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .auth-tab { padding: 0.5rem 1rem; border-radius: var(--radius-sm); cursor: pointer; background: var(--bg-secondary); border: 1px solid transparent; color: var(--text-secondary); }
    .auth-tab.active { background: rgba(0,255,159,0.15); color: var(--accent); border-color: var(--accent); }
    .auth-error { color: var(--error); font-size: 0.85rem; margin-top: -0.5rem; }
    .auth-success { color: var(--accent); font-size: 0.85rem; margin-top: -0.5rem; }
    .auth-footer { margin-top: 1.5rem; text-align: center; }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>✋ Система рисования</h1>
      <p>Войдите или создайте аккаунт</p>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Вход</button>
        <button class="auth-tab" id="tabSignup">Регистрация</button>
      </div>
      <form class="auth-form" id="authForm">
        <input type="email" id="email" placeholder="Email" required autocomplete="email">
        <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
        <div id="authMessage"></div>
        <button type="submit" class="auth-btn auth-btn-primary" id="submitBtn">Войти</button>
      </form>
      <div class="auth-footer">
        <a href="index.html">← Вернуться в приложение</a>
      </div>
    </div>
  </div>
  <script type="module">
    import { supabase } from './supabase-config.js';

    if (!supabase) {
      document.getElementById('authMessage').innerHTML = '<span class="auth-error">Supabase не настроен.</span>';
    } else {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      if (accessToken) {
        await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        window.location.replace(redirect || 'dashboard.html');
      }
    }

    const tabLogin = document.getElementById('tabLogin');
    const tabSignup = document.getElementById('tabSignup');
    const form = document.getElementById('authForm');
    const submitBtn = document.getElementById('submitBtn');
    const msgEl = document.getElementById('authMessage');
    let isSignup = false;

    tabLogin.addEventListener('click', () => { isSignup = false; tabLogin.classList.add('active'); tabSignup.classList.remove('active'); submitBtn.textContent = 'Войти'; msgEl.textContent = ''; });
    tabSignup.addEventListener('click', () => { isSignup = true; tabSignup.classList.add('active'); tabLogin.classList.remove('active'); submitBtn.textContent = 'Регистрация'; msgEl.textContent = ''; });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!supabase) return;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      msgEl.textContent = '';
      msgEl.className = '';
      submitBtn.disabled = true;
      try {
        if (isSignup) {
          const { data, error } = await supabase.auth.signUp({ email, password });
          if (error) throw error;
          if (data?.session) {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            window.location.href = redirect || 'dashboard.html';
          } else {
            msgEl.textContent = 'Регистрация успешна! Можете войти.';
            msgEl.className = 'auth-success';
          }
        } else {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          const params = new URLSearchParams(window.location.search);
          const redirect = params.get('redirect');
          window.location.href = redirect || 'dashboard.html';
        }
      } catch (err) {
        msgEl.textContent = err.message || 'Произошла ошибка';
        msgEl.className = 'auth-error';
      }
      submitBtn.disabled = false;
    });
  </script>
</body>
</html>
